{% set name = "openactive" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/openactive-{{ version }}.tar.gz
  sha256: 57ec1248a6b21a4663f00f9c5f6a4279d028426b34732d13b84be57db63196fd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - pip
  run:
    - python >={{ python_min }}
    - beautifulsoup4
    - requests
    - termcolor

test:
  imports:
    - openactive
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/openactive/openactive-python
  summary: For reading feeds of sports and activity data published in the OpenActive format
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Reikyo
