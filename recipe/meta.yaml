{% set name = "openactive" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/openactive-{{ version }}.tar.gz
  sha256: f887229f9f8a75add9340ff59292c29f61bfb4cde68678cd562112015037cc35

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.6
    - setuptools >=61.0.0
    - pip
  run:
    - python >=3.7
    - beautifulsoup4
    - requests
    - termcolor

test:
  imports:
    - openactive
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/openactive/openactive-python
  summary: For reading feeds of sports and activity data published in the OpenActive format
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Reikyo
